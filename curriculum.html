<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CV Moderno</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a3d62, #3c6382);
}

.cv {
    width: 900px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: 300px 1fr;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* LADO IZQUIERDO */
.sidebar {
    background: #1e3799;
    color: white;
    padding: 30px;
}

.foto {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #ccc;
    margin: 0 auto 20px;
}

.bloque {
    margin-bottom: 30px;
}

.titulo {
    height: 12px;
    width: 70%;
    background: #60a3bc;
    margin-bottom: 15px;
    border-radius: 5px;
}

.linea {
    height: 8px;
    background: #82ccdd;
    margin-bottom: 10px;
    border-radius: 5px;
}

/* LADO DERECHO */
.contenido {
    padding: 40px;
}

.header {
    margin-bottom: 30px;
}

.nombre {
    height: 20px;
    width: 60%;
    background: #0a3d62;
    margin-bottom: 10px;
    border-radius: 5px;
}

.subtitulo {
    height: 10px;
    width: 40%;
    background: #3c6382;
    border-radius: 5px;
}

.seccion {
    margin-bottom: 30px;
}

.seccion .titulo {
    width: 30%;
    background: #0a3d62;
}

.card {
    margin-top: 15px;
}

.card .linea {
    background: #ccc;
}

</style>
</head>

<body>

<div class="cv">

    <!-- IZQUIERDA -->
    <div class="sidebar">

        <div class="foto"></div>

        <div class="bloque">
            <div class="titulo"></div>
            <div class="linea"></div>
            <div class="linea"></div>
            <div class="linea"></div>
        </div>

        <div class="bloque">
            <div class="titulo"></div>
            <div class="linea"></div>
            <div class="linea"></div>
        </div>

        <div class="bloque">
            <div class="titulo"></div>
            <div class="linea"></div>
            <div class="linea"></div>
            <div class="linea"></div>
        </div>

    </div>

    <!-- DERECHA -->
    <div class="contenido">

        <div class="header">
            <div class="nombre"></div>
            <div class="subtitulo"></div>
        </div>

        <div class="seccion">
            <div class="titulo"></div>
            <div class="card">
                <div class="linea"></div>
                <div class="linea"></div>
                <div class="linea"></div>
            </div>
        </div>

        <div class="seccion">
            <div class="titulo"></div>
            <div class="card">
                <div class="linea"></div>
                <div class="linea"></div>
            </div>
        </div>

        <div class="seccion">
            <div class="titulo"></div>
            <div class="card">
                <div class="linea"></div>
                <div class="linea"></div>
                <div class="linea"></div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
